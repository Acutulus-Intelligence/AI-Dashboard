services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: actulus
      POSTGRES_PASSWORD: actulus_secret
      POSTGRES_DB: ai_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actulus -d ai_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@actulus.ai
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  presentation:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: 
      - ./.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: