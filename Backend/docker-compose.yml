services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: actulus
      POSTGRES_PASSWORD: actulus_secret
      POSTGRES_DB: ai_dashboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actulus -d ai_dashboard"]
      interval: 5s
      timeout: 3s
      retries: 5

  presentation:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Default: "Host=db;Port=5432;Database=ai_dashboard;Username=actulus;Password=actulus_secret"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../Frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata: