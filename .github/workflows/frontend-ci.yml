name: Frontend CI

on:
  push:
    paths: ["Frontend/**"]
  pull_request:
    branches: [main]
    paths: ["Frontend/**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Frontend

      - name: Build
        run: npm run build
        working-directory: Frontend
